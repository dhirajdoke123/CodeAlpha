<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; }

    h1 { text-align: center; padding: 20px; }

    .filters {
      text-align: center;
      margin-bottom: 20px;
    }

    .filters button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    .filters button:hover { background: #555; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s, filter 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      filter: brightness(80%);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .lightbox img {
      max-width: 80%;
      max-height: 70%;
      border-radius: 10px;
    }

    .controls {
      margin-top: 15px;
    }

    .controls button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    @media(max-width: 600px) {
      .gallery img { height: 150px; }
    }
  </style>
</head>
<body>

<h1>Image Gallery</h1>

<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery" id="gallery">
  <img src="https://picsum.photos/id/1015/400/300" data-category="nature" onclick="openLightbox(0)">
  <img src="https://picsum.photos/id/1011/400/300" data-category="nature" onclick="openLightbox(1)">
  <img src="https://picsum.photos/id/1012/400/300" data-category="city" onclick="openLightbox(2)">
  <img src="https://picsum.photos/id/1016/400/300" data-category="city" onclick="openLightbox(3)">
</div>

<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img">
  <div class="controls">
    <button onclick="prevImage()">Prev</button>
    <button onclick="nextImage()">Next</button>
  </div>
</div>

<script>
  const images = document.querySelectorAll('.gallery img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    lightbox.style.display = 'flex';
    showImage();
  }

  function closeLightbox() {
    lightbox.style.display = 'none';
  }

  function showImage() {
    lightboxImg.src = images[currentIndex].src;
  }

  function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
  }

  function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
  }

  function filterImages(category) {
    images.forEach(img => {
      if (category === 'all' || img.dataset.category === category) {
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }
    });
  }
</script>

</body>
</html>
