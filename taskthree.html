<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#2b2b45);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .player {
    width: 320px;
    background: #2f2f4f;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
  }

  .title { font-size: 18px; margin-bottom: 5px; }
  .artist { font-size: 14px; color: #ccc; margin-bottom: 15px; }

  .controls button {
    margin: 10px;
    padding: 10px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    background: #444;
    color: white;
    transition: 0.3s;
  }

  .controls button:hover { background: #666; transform: scale(1.1); }

  .progress-container {
    width: 100%;
    height: 5px;
    background: #555;
    margin: 15px 0;
    cursor: pointer;
    border-radius: 5px;
  }

  .progress {
    height: 100%;
    width: 0%;
    background: #1db954;
    border-radius: 5px;
  }

  .time {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #ccc;
  }

  .volume {
    margin-top: 10px;
  }

  input[type="range"] {
    width: 100%;
  }

  .playlist {
    margin-top: 15px;
    text-align: left;
    max-height: 120px;
    overflow-y: auto;
  }

  .playlist div {
    padding: 5px;
    cursor: pointer;
    border-bottom: 1px solid #444;
  }

  .playlist div:hover { background: #444; }
  .active { background: #1db954 !important; }
</style>
</head>
<body>

<div class="player">
  <div class="title" id="title">Song Title</div>
  <div class="artist" id="artist">Artist</div>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">⏯</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <div class="progress-container" onclick="setProgress(event)">
    <div class="progress" id="progress"></div>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="volume">
    Volume
    <input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
  </div>

  <div class="playlist" id="playlist"></div>
</div>

<script>
  const songs = [
    { title: "Song 1", artist: "Artist A", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { title: "Song 2", artist: "Artist B", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { title: "Song 3", artist: "Artist C", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
  ];

  let currentIndex = 0;
  const audio = document.getElementById('audio');
  const title = document.getElementById('title');
  const artist = document.getElementById('artist');
  const progress = document.getElementById('progress');
  const playlistEl = document.getElementById('playlist');

  function loadSong(index) {
    const song = songs[index];
    audio.src = song.src;
    title.textContent = song.title;
    artist.textContent = song.artist;
    highlightPlaylist();
  }

  function togglePlay() {
    if (audio.paused) audio.play(); else audio.pause();
  }

  function nextSong() {
    currentIndex = (currentIndex + 1) % songs.length;
    loadSong(currentIndex);
    audio.play();
  }

  function prevSong() {
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    loadSong(currentIndex);
    audio.play();
  }

  audio.addEventListener('timeupdate', () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + '%';

    document.getElementById('current').textContent = formatTime(audio.currentTime);
    document.getElementById('duration').textContent = formatTime(audio.duration);
  });

  function setProgress(e) {
    const width = e.currentTarget.clientWidth;
    const clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
  }

  function setVolume(val) {
    audio.volume = val;
  }

  function formatTime(sec) {
    if (!sec) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  function createPlaylist() {
    songs.forEach((song, index) => {
      const div = document.createElement('div');
      div.textContent = song.title + ' - ' + song.artist;
      div.onclick = () => {
        currentIndex = index;
        loadSong(index);
        audio.play();
      };
      playlistEl.appendChild(div);
    });
  }

  function highlightPlaylist() {
    const items = playlistEl.querySelectorAll('div');
    items.forEach((item, i) => {
      item.classList.toggle('active', i === currentIndex);
    });
  }

  audio.addEventListener('ended', nextSong);

  // Init
  loadSong(currentIndex);
  createPlaylist();
</script>

</body>
</html>
